<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Galaxi ETS — Electronics Inventory System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f0e;--bg2:#141614;--bg3:#1a1c1a;--bg4:#212421;--bg5:#272a27;
  --border:#2a2d2a;--border2:#383b38;
  --text:#e8ebe5;--text2:#9ba89a;--text3:#5a665a;
  --accent:#4ade80;--accent2:#22c55e;--adim:rgba(74,222,128,0.10);
  --warn:#f59e0b;--wdim:rgba(245,158,11,0.10);
  --danger:#f87171;--ddim:rgba(248,113,113,0.10);
  --info:#60a5fa;--idim:rgba(96,165,250,0.10);
  --purple:#a78bfa;--pdim:rgba(167,139,250,0.10);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono','Fira Code',monospace;
  --r:6px;--r2:10px;--sidebar:215px;
}
html,body{height:100%;overflow:hidden;font-size:13px}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
input,select,textarea,button{font-family:var(--font);font-size:13px}
button{cursor:pointer}

/* ─── LOGIN ─────────────────────────────────────────────────────────────── */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.lcard{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:400px;padding:40px}
.llogo{display:flex;align-items:center;gap:12px;margin-bottom:30px}
.lmark{width:44px;height:44px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center}
.lmark svg{width:24px;height:24px;color:#0d0f0e;stroke:#0d0f0e !important}
.lname{font-size:22px;font-weight:800;color:var(--text)}
.lsub{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.ltitle{font-size:15px;font-weight:700;margin-bottom:6px}
.ldesc{font-size:12px;color:var(--text3);margin-bottom:22px}
.lfg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.lfg label{font-size:11px;font-weight:600;color:var(--text2);font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em}
.lfg input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:0 12px;height:38px;color:var(--text);outline:none;font-size:14px;transition:border-color .15s;width:100%}
.lfg input:focus{border-color:var(--accent)}
.lfg input::placeholder{color:var(--text3)}
.lerr{color:var(--danger);font-size:12px;margin-bottom:12px;display:none;background:var(--ddim);padding:8px 12px;border-radius:var(--r);border:1px solid rgba(248,113,113,.2)}
.lbtn{width:100%;height:40px;background:var(--accent);color:#0d0f0e;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.lbtn:hover{background:var(--accent2)}
.lhint{font-size:10px;color:var(--text3);text-align:center;margin-top:14px;line-height:1.6}

/* ─── LAYOUT ─────────────────────────────────────────────────────────────── */
#app{display:flex;height:100vh}
#sidebar{width:var(--sidebar);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-mark{width:32px;height:32px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-mark svg{width:17px;height:17px;color:#0d0f0e;stroke:#0d0f0e !important}
.logo-name{font-size:14px;font-weight:700;letter-spacing:.01em}
.logo-ver{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:1px}
.nav{flex:1;overflow-y:auto;padding:6px 0}
.nav-sec{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:10px 14px 3px;font-family:var(--mono)}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 14px;cursor:pointer;color:var(--text2);font-size:12px;transition:all .12s;position:relative;white-space:nowrap}
.nav-item:hover{color:var(--text);background:var(--bg3)}
.nav-item.active{color:var(--accent);background:var(--adim)}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent);border-radius:0 2px 2px 0}
.nav-item svg{width:14px;height:14px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.nbadge{margin-left:auto;background:var(--ddim);color:var(--danger);font-size:10px;font-weight:700;padding:1px 5px;border-radius:8px;font-family:var(--mono)}
.sidebar-foot{padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0}
.user-pill{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg3);border-radius:var(--r);cursor:pointer;transition:background .12s}
.user-pill:hover{background:var(--bg4)}
.uavatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#0d0f0e;flex-shrink:0;font-family:var(--mono)}
.uname{font-size:12px;font-weight:600}
.urole{font-size:10px;color:var(--text3)}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:50px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;gap:12px}
.tb-title{font-size:14px;font-weight:600}
.tb-right{display:flex;align-items:center;gap:8px}
.sw{position:relative;display:flex;align-items:center}
.sw svg{position:absolute;left:9px;width:13px;height:13px;color:var(--text3);pointer-events:none}
.si{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:0 10px 0 30px;height:30px;color:var(--text);outline:none;font-size:12px;width:200px;transition:border-color .15s}
.si:focus{border-color:var(--border2)}
.si::placeholder{color:var(--text3)}
.iBtn{width:30px;height:30px;border-radius:var(--r);background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text2);cursor:pointer;transition:all .12s}
.iBtn:hover{background:var(--bg4);color:var(--text)}
.iBtn svg{width:13px;height:13px}
#content{flex:1;overflow-y:auto;padding:22px 24px}
.page{display:none}
.page.active{display:block;animation:fi .18s ease}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}

/* ─── PAGE HEADER ────────────────────────────────────────────────────────── */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px}
.ph-left h1{font-size:19px;font-weight:700;margin-bottom:3px}
.ph-left p{font-size:12px;color:var(--text3)}
.ph-right{display:flex;align-items:center;gap:7px;flex-shrink:0}

/* ─── BUTTONS ────────────────────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:0 13px;height:30px;border-radius:var(--r);font-size:12px;font-weight:500;border:none;transition:all .12s;white-space:nowrap;cursor:pointer}
.btn svg{width:12px;height:12px}
.btn-primary{background:var(--accent);color:#0d0f0e}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg4);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg5)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-danger{background:var(--ddim);color:var(--danger);border:1px solid rgba(248,113,113,.2)}
.btn-danger:hover{background:rgba(248,113,113,.18)}
.btn-warn{background:var(--wdim);color:var(--warn);border:1px solid rgba(245,158,11,.2)}
.btn-sm{height:26px;padding:0 9px;font-size:11px}
.btn-sm svg{width:11px;height:11px}

/* ─── METRICS ────────────────────────────────────────────────────────────── */
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px}
.mcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:15px;position:relative;overflow:hidden}
.mcard::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;opacity:0}
.mcard.ca::after{background:var(--accent);opacity:1}
.mcard.cw::after{background:var(--warn);opacity:1}
.mcard.cd::after{background:var(--danger);opacity:1}
.mcard.ci::after{background:var(--info);opacity:1}
.mlabel{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:.04em;margin-bottom:8px;text-transform:uppercase}
.mval{font-size:24px;font-weight:700;font-family:var(--mono);line-height:1;margin-bottom:5px}
.msub{font-size:11px;color:var(--text3)}
.msub.up{color:var(--accent)}
.msub.dn{color:var(--danger)}
.msub.warn{color:var(--warn)}

/* ─── CARD ───────────────────────────────────────────────────────────────── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:16px;overflow:hidden}
.card-h{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.card-title{font-size:13px;font-weight:600}
.card-b{padding:16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

/* ─── TABLE ──────────────────────────────────────────────────────────────── */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);padding:9px 13px;border-bottom:1px solid var(--border);font-family:var(--mono);text-align:left;white-space:nowrap;background:var(--bg2)}
tbody td{padding:10px 13px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.025);color:var(--text)}
.td-p{color:var(--text)!important;font-weight:500}
.td-m{font-family:var(--mono);font-size:11px}
.empty-row td{text-align:center;padding:40px;color:var(--text3)}

/* ─── TAGS ───────────────────────────────────────────────────────────────── */
.tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;font-family:var(--mono);white-space:nowrap}
.tag::before{content:'';width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0}
.tg{background:rgba(74,222,128,.12);color:#4ade80}
.ty{background:rgba(245,158,11,.12);color:#f59e0b}
.tr{background:rgba(248,113,113,.12);color:#f87171}
.tb{background:rgba(96,165,250,.12);color:#60a5fa}
.tp{background:rgba(167,139,250,.12);color:#a78bfa}
.tgr{background:rgba(90,102,90,.25);color:#9ba89a}
.to{background:rgba(251,146,60,.12);color:#fb923c}

/* ─── TOOLBAR ────────────────────────────────────────────────────────────── */
.toolbar{display:flex;align-items:center;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.ifield{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:0 10px;height:30px;color:var(--text);outline:none;transition:border-color .15s;font-size:12px}
.ifield:focus{border-color:var(--accent)}
.ifield::placeholder{color:var(--text3)}
select.ifield option{background:var(--bg3)}
.spacer{flex:1}

/* ─── FLOW STEPS ─────────────────────────────────────────────────────────── */
.flow{display:flex;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 16px;margin-bottom:18px;overflow-x:auto;gap:4px}
.fstep{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:500;padding:5px 11px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg3);color:var(--text3);white-space:nowrap}
.fstep .fn{width:16px;height:16px;border-radius:50%;background:var(--border2);display:flex;align-items:center;justify-content:center;font-size:9px;font-family:var(--mono);font-weight:800;flex-shrink:0}
.fstep.done{background:rgba(74,222,128,.07);color:var(--accent);border-color:rgba(74,222,128,.2)}
.fstep.done .fn{background:var(--accent);color:#0d0f0e}
.fstep.cur{background:rgba(96,165,250,.08);color:var(--info);border-color:rgba(96,165,250,.22)}
.fstep.cur .fn{background:var(--info);color:#0d0f0e}
.farrow{color:var(--border2);font-size:14px;padding:0 3px;flex-shrink:0}

/* ─── ALERTS ─────────────────────────────────────────────────────────────── */
.alert{display:flex;align-items:center;gap:9px;padding:9px 13px;border-radius:var(--r);margin-bottom:14px;font-size:12px;border:1px solid}
.alert svg{width:13px;height:13px;flex-shrink:0}
.aw{background:var(--wdim);color:var(--warn);border-color:rgba(245,158,11,.22)}
.ai{background:var(--idim);color:var(--info);border-color:rgba(96,165,250,.22)}
.ag{background:var(--adim);color:var(--accent);border-color:rgba(74,222,128,.22)}
.ae{background:var(--ddim);color:var(--danger);border-color:rgba(248,113,113,.22)}

/* ─── FORM ───────────────────────────────────────────────────────────────── */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg.s2{grid-column:span 2}
.fg.s3{grid-column:span 3}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.flabel{font-size:10px;font-weight:700;color:var(--text2);font-family:var(--mono);letter-spacing:.04em;text-transform:uppercase}
.fctl{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:0 10px;height:34px;color:var(--text);outline:none;transition:border-color .15s;font-size:13px;width:100%}
.fctl:focus{border-color:var(--accent)}
.fctl::placeholder{color:var(--text3)}
select.fctl option{background:var(--bg3)}
textarea.fctl{height:72px;padding:8px 10px;resize:vertical}
.fhint{font-size:10px;color:var(--text3);margin-top:2px}
.freq{color:var(--danger);margin-left:2px}

/* ─── MODAL ──────────────────────────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(3px)}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;width:600px;max-width:96vw;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;animation:mi .18s ease}
.modal.wide{width:800px}
.modal.xl{width:960px}
@keyframes mi{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.mh-title{font-size:14px;font-weight:700}
.mclose{width:26px;height:26px;border-radius:var(--r);background:transparent;border:1px solid var(--border);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s}
.mclose:hover{background:var(--bg3);color:var(--text)}
.mclose svg{width:12px;height:12px}
.mb{padding:20px;overflow-y:auto;flex:1}
.mf{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:7px;flex-shrink:0}

/* ─── TOAST ──────────────────────────────────────────────────────────────── */
#toasts{position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:7px}
.toast{display:flex;align-items:center;gap:9px;padding:11px 15px;border-radius:var(--r2);min-width:260px;animation:tani .22s ease;font-size:12px;font-weight:500;border:1px solid}
.toast svg{width:13px;height:13px;flex-shrink:0}
.ts{background:rgba(13,15,14,.97);color:var(--accent);border-color:rgba(74,222,128,.28)}
.te{background:rgba(13,15,14,.97);color:var(--danger);border-color:rgba(248,113,113,.28)}
.ti{background:rgba(13,15,14,.97);color:var(--info);border-color:rgba(96,165,250,.28)}
.tw2{background:rgba(13,15,14,.97);color:var(--warn);border-color:rgba(245,158,11,.28)}
@keyframes tani{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

/* ─── DROP ZONE ──────────────────────────────────────────────────────────── */
.dropzone{border:2px dashed var(--border2);border-radius:var(--r);padding:24px;text-align:center;color:var(--text3);cursor:pointer;transition:all .15s}
.dropzone:hover,.dropzone.over{border-color:var(--accent);color:var(--accent);background:var(--adim)}
.dropzone input{display:none}
.dropzone svg{width:28px;height:28px;margin-bottom:10px;opacity:.5}
.dropzone p{font-size:13px}
.dropzone span{font-size:11px;display:block;margin-top:4px}

/* ─── BOM MATCH ITEMS ────────────────────────────────────────────────────── */
.bom-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:var(--r);margin-bottom:5px;background:var(--bg3);border:1px solid var(--border)}
.bsi{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.bsi-ok{background:rgba(74,222,128,.15);color:var(--accent)}
.bsi-w{background:rgba(245,158,11,.15);color:var(--warn)}
.bsi-bad{background:rgba(248,113,113,.15);color:var(--danger)}
.bsi-unk{background:rgba(167,139,250,.15);color:var(--purple)}

/* ─── PROG BAR ───────────────────────────────────────────────────────────── */
.pb{margin-bottom:8px}
.pb-l{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:4px}
.pb-t{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.pb-f{height:100%;border-radius:3px}
.pb-f.ok{background:var(--accent)}
.pb-f.warn{background:var(--warn)}
.pb-f.low{background:var(--danger)}

/* ─── SECTION DIVIDER ────────────────────────────────────────────────────── */
.sdiv{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);padding:14px 0 6px;border-top:1px solid var(--border);margin-top:14px}
.sdiv:first-child{border-top:none;margin-top:0;padding-top:0}

@media(max-width:1100px){.metrics{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="lcard">
    <div class="llogo">
      <div class="lmark"><svg viewBox="0 0 24 24" fill="none" stroke="#0d0f0e" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
      <div><div class="lname">Galaxi ETS</div><div class="lsub">Electronics Inventory System</div></div>
    </div>
    <div class="ltitle">Sign in to your account</div>
    <div class="ldesc">Enter the credentials provided by your administrator</div>
    <div class="lfg">
      <label>Username</label>
      <input type="text" id="l-user" placeholder="Enter username" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('l-pass').focus()">
    </div>
    <div class="lfg">
      <label>Password</label>
      <input type="password" id="l-pass" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="lerr" id="lerr">Invalid username or password. Please try again.</div>
    <button class="lbtn" onclick="doLogin()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
      Sign In
    </button>
    <div class="lhint">Contact your administrator for login credentials.<br>Each user has a unique username and password.</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <nav id="sidebar">
    <div class="logo">
      <div class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#0d0f0e" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
      <div><div class="logo-name">Galaxi ETS</div><div class="logo-ver">v5.0 Production</div></div>
    </div>
    <div class="nav" id="nav"></div>
    <div class="sidebar-foot">
      <div class="user-pill" onclick="showPage('settings')">
        <div class="uavatar" id="uav"></div>
        <div><div class="uname" id="uname"></div><div class="urole" id="urole"></div></div>
      </div>
    </div>
  </nav>
  <div id="main">
    <div id="topbar">
      <div class="tb-title" id="tbtitle">Dashboard</div>

// ═══════════════════════════════════════════════════════════════
// CLOUD STORAGE — Google Sheets backend
// Set your Google Apps Script Web App URL below after deploying
// ═══════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════════════
// CLOUD STORAGE — Google Sheets via JSONP (works in ALL browsers, no CORS)
// Set your deployed Google Apps Script URL below
// ═══════════════════════════════════════════════════════════════════════════
const GAS_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE';

const _cache = {};
let _dirty   = {};
let _timer   = null;
let _cbCount = 0;

// ── JSONP: injects <script> tag — bypasses CORS in ALL browsers ───────────────
function jsonp(url, timeout){
  timeout = timeout || 12000;
  return new Promise(function(resolve, reject){
    var cbName = '__gx_' + (++_cbCount) + '_' + Date.now();
    var script = document.createElement('script');
    var sep = url.indexOf('?') >= 0 ? '&' : '?';
    script.src = url + sep + 'cb=' + cbName;
    var done = false;
    window[cbName] = function(data){
      if(done) return; done = true;
      clearTimeout(timer); script.remove(); delete window[cbName];
      resolve(data);
    };
    var timer = setTimeout(function(){
      if(done) return; done = true;
      script.remove(); delete window[cbName];
      reject(new Error('Timeout'));
    }, timeout);
    script.onerror = function(){
      if(done) return; done = true;
      clearTimeout(timer); script.remove(); delete window[cbName];
      reject(new Error('Script error — check GAS URL'));
    };
    document.head.appendChild(script);
  });
}

// ── load ──────────────────────────────────────────────────────────────────────
function load(k){ return _cache[k] !== undefined ? _cache[k] : null; }

// ── save: cache + queue sync ──────────────────────────────────────────────────
function save(k, v){
  _cache[k] = v; _dirty[k] = v;
  clearTimeout(_timer); _timer = setTimeout(syncDirty, 700);
}

// ── syncDirty: push changed keys to Google Sheets ────────────────────────────
async function syncDirty(){
  if(!GAS_URL || GAS_URL === 'https://script.google.com/macros/s/AKfycbwNfI4iXgCsmqmCtOs8hbqW7_V0Gdak96qn0I-Ko8lO9SL0vskmTUt9j7LdKu1YsQ_I/exec') return;
  var batch = Object.assign({}, _dirty); _dirty = {};
  setSyncDot('saving');
  var ok = true;
  for(var k in batch){
    try{
      var val = encodeURIComponent(JSON.stringify(batch[k]));
      var url = GAS_URL + '?action=set&key=' + encodeURIComponent(k) + '&value=' + val;
      var r = await jsonp(url);
      if(!r || !r.ok) throw new Error(r ? r.error : 'no response');
    }catch(e){
      console.warn('Save failed:', k, e.message);
      _dirty[k] = batch[k];
      ok = false;
    }
  }
  setSyncDot(ok ? 'ok' : 'error');
}

// ── loadAllFromCloud: fetch everything on startup ─────────────────────────────
async function loadAllFromCloud(){
  if(!GAS_URL || GAS_URL === 'https://script.google.com/macros/s/AKfycbwNfI4iXgCsmqmCtOs8hbqW7_V0Gdak96qn0I-Ko8lO9SL0vskmTUt9j7LdKu1YsQ_I/exec'){
    setSyncDot('offline'); return false;
  }
  setSyncDot('loading');
  try{
    var d = await jsonp(GAS_URL + '?action=getall', 15000);
    if(!d || !d.ok) throw new Error(d ? d.error : 'Bad response');
    var n = 0;
    for(var k in (d.data || {})){
      var v = d.data[k];
      try{ _cache[k] = typeof v === 'string' ? JSON.parse(v) : v; n++; }
      catch(e){ _cache[k] = v; n++; }
    }
    setSyncDot('ok');
    console.log('Cloud: loaded', n, 'keys');
    return true;
  }catch(e){
    console.error('Cloud load error:', e.message);
    setSyncDot('error');
    toast('Cloud sync failed — ' + e.message, 'error');
    return false;
  }
}

// ── manualSync: force reload ──────────────────────────────────────────────────
async function manualSync(){
  setSyncDot('loading');
  var ok = await loadAllFromCloud();
  if(ok){
    var pg = document.querySelector('.nav-item.active');
    if(pg) showPage(pg.id.replace('ni-',''));
    toast('Synced from cloud','success');
  }
}

// ── Coloured dot in topbar shows sync status ──────────────────────────────────
function setSyncDot(state){
  var el = document.getElementById('syncDot');
  if(!el){
    el = document.createElement('div');
    el.id = 'syncDot';
    el.style.cssText = 'width:9px;height:9px;border-radius:50%;flex-shrink:0;cursor:pointer;transition:background .3s;margin-right:2px';
    el.onclick = manualSync;
    var tbr = document.querySelector('#topbar .tb-right');
    if(tbr) tbr.prepend(el);
  }
  var colors = {loading:'#60a5fa',saving:'#f59e0b',ok:'#4ade80',error:'#f87171',offline:'#5a665a'};
  var tips   = {loading:'Loading...',saving:'Saving...',ok:'Cloud in sync — click to refresh',error:'Error — click to retry',offline:'Offline mode'};
  el.style.background = colors[state] || '#5a665a';
  el.title = tips[state] || '';
}

function badgeCount(id){
  if(id==='wo')return getWO().filter(w=>w.status==='erp_review'||w.status==='cto_approval').length||'';
  if(id==='ic'){
    // CTO sees pending, ERP sees cto_approved (ready for them to add)
    if(isCTO())return getIC().filter(i=>i.status==='pending').length||'';
    if(isERP())return getIC().filter(i=>i.status==='cto_approved').length||'';
    return getIC().filter(i=>i.status==='pending'||i.status==='cto_approved').length||'';
  }
  if(id==='pr'){
    if(isCTO())return getPR().filter(p=>p.status==='open').length||'';
    if(isPUR())return getPR().filter(p=>['cto_approved','po_released','gin_done','qc_fail','vendor_return'].includes(p.status)).length||'';

    return getPR().filter(p=>p.status==='open').length||'';
  }
  return '';
}

  t.className=`toast ${cls}`;t.innerHTML=ic(ico)+`<span>${msg}</span>`;

}

function sTag(s,map){const m=map[s];return m?`<span class="tag ${m[0]}">${m[1]}</span>`:`<span class="tag tgr">${s||'—'}</span>`;}
const WOST={erp_review:['ty','ERP Review'],cto_approval:['tb','CTO Approval'],active:['tg','Active'],complete:['tgr','Complete'],rejected:['tr','Rejected']};
const PRST={
  open:          ['ty','Awaiting CTO Approval'],
  cto_approved:  ['tb','CTO Approved — Purchase Action'],
  po_released:   ['tp','PO Released'],
  gin_done:      ['to','GIN Done — At Store'],
  grn_pending:   ['tb','GRN Pending — Store Action'],
  qc_pass:       ['tg','QC Passed — Stocked'],
  qc_fail:       ['tr','QC Failed'],
  vendor_return: ['ty','Sent to Vendor'],
  closed:        ['tgr','Closed'],
  rejected:      ['tr','Rejected by CTO'],
};
const GRNQC={pass:['tg','Pass'],fail:['tr','Fail'],pending:['ty','Pending']};
const GRNST={stocked:['tg','Stocked'],qc_hold:['ty','QC Hold'],rejected:['tr','Rejected']};
const ICST={pending:['ty','CTO Review'],approved:['tg','Approved'],alternate:['tb','Alt. Suggested'],rejected:['tr','Rejected']};
function stockTag(i){
  const av=i.qty-i.reserved;
  if(i.qty===0)return`<span class="tag tr">Out of Stock</span>`;
  if(i.qty<=(i.alert||0))return`<span class="tag ty">Low Stock</span>`;
  return`<span class="tag tg">Available</span>`;
}
function genId(prefix,existing){let n=existing.length+1;while(existing.find(x=>x.id===`${prefix}${String(n).padStart(3,'0')}`))n++;return`${prefix}${String(n).padStart(3,'0')}`;}
function getNextGPN(){
  // Scans entire inventory for GA_XXXX format, returns next sequential number
  const inv=getInv();
  let max=1000; // start from GA_1001 if no existing ones
  inv.forEach(x=>{
    if(x.id&&x.id.startsWith('GA_')){
      const n=parseInt(x.id.slice(3));
      if(!isNaN(n)&&n>max)max=n;
    }
  });
  return'GA_'+(max+1);
}
function ts(){return new Date().toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function getActiveWOs(){return getWO().filter(w=>w.status==='active');}
function setupDrop(dzId,cb){
  const dz=document.getElementById(dzId);if(!dz)return;
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');const f=e.dataTransfer.files[0];if(f)cb(f);});
}

function rInvTable(){
  const inv=getInv();const f=invF;const q=f.q.toLowerCase();
  let items=inv.filter(i=>{
    if(q&&!i.id?.toLowerCase().includes(q)&&!i.desc?.toLowerCase().includes(q)&&!i.mpn?.toLowerCase().includes(q)&&!i.mfr?.toLowerCase().includes(q))return false;
    if(f.cat&&i.cat!==f.cat)return false;
    if(f.type&&i.type!==f.type)return false;
    return true;
  });
  const c=document.getElementById('invCnt');if(c)c.textContent=`${items.length} / ${inv.length}`;
  const w=document.getElementById('invTbl');if(!w)return;
  if(!items.length){w.innerHTML=`<div style="padding:48px;text-align:center;color:var(--text3)">${ic('box',32)}<p style="margin-top:12px">${inv.length?'No match':'No components yet'}</p></div>`;return;}
  w.innerHTML=`<table>
    <thead><tr><th>Galaxi PN</th><th>Description</th><th>Manufacturer</th><th>MPN</th><th>Total Qty</th><th>Reserved</th><th>Available</th><th>Alert</th><th>Location</th><th>Category</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${items.map(i=>{
      const av=i.qty-i.reserved;
      const avc=av<=0?'var(--danger)':i.qty<=(i.alert||0)?'var(--warn)':'var(--accent)';
      return`<tr>
        <td class="td-p td-m">${i.id}</td>
        <td class="td-p" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${i.desc}">${i.desc}</td>
        <td>${i.mfr}</td><td class="td-m">${i.mpn}</td>
        <td class="td-m">${i.qty}</td>
        <td class="td-m" style="color:var(--warn)">${i.reserved}</td>
        <td class="td-m" style="color:${avc};font-weight:700">${av}</td>
        <td class="td-m" style="color:var(--text3)">${i.alert||0}</td>
        <td style="font-size:11px">${i.location||'—'}</td>
        <td><span class="tag ${i.type==='project'?'tb':'tgr'}">${i.cat}</span></td>
        <td>${stockTag(i)}</td>
        <td><div style="display:flex;gap:4px">
          <button class="btn btn-ghost btn-sm" onclick="viewComp('${i.id}')">${ic('eye',11)}</button>
          ${isERP()?`<button class="btn btn-ghost btn-sm" onclick="editComp('${i.id}')">${ic('edit',11)}</button><button class="btn btn-danger btn-sm" onclick="delComp('${i.id}')">${ic('trash',11)}</button>`:''}
        </div></td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

    `<button class="btn btn-secondary" onclick="cModal()">Cancel</button><button class="btn btn-primary" onclick="saveComp('${id}')">Save</button>`);

function saveComp(id){
  if(!isERP())return;
  const inv=getInv();const i=inv.find(x=>x.id===id);if(!i)return;
  const oldQty=i.qty;
  i.desc=document.getElementById('ec-desc').value.trim()||i.desc;
  i.mfr=document.getElementById('ec-mfr').value.trim()||i.mfr;
  i.mpn=document.getElementById('ec-mpn').value.trim()||i.mpn;
  i.qty=parseInt(document.getElementById('ec-qty').value)||0;
  i.alert=parseInt(document.getElementById('ec-alert').value)||0;
  i.location=document.getElementById('ec-loc').value.trim();
  i.cat=document.getElementById('ec-cat').value.trim();
  i.type=document.getElementById('ec-type').value;
  save(KEYS.inv,inv);
  if(i.qty!==oldQty)addMov({gpn:id,desc:i.desc,type:'adjusted',qty:i.qty-oldQty,ref:'EDIT-'+Date.now(),project:'—',user:S.currentUser.displayName||S.currentUser.label});
  addLog('Edit Component',id);cModal();toast('Saved');rInv(document.getElementById('pg-inventory'));
}
function delComp(id){
  if(!isERP())return;
  if(!confirm(`Delete ${id}?`))return;
  save(KEYS.inv,getInv().filter(x=>x.id!==id));
  addLog('Delete Component',id);toast('Deleted','warn');
  rInv(document.getElementById('pg-inventory'));
}

function showImportModal(){

  openModal('Import Components from Excel',`

    <div class="dropzone" id="imp-dz" onclick="document.getElementById('impFile').click()">
      <input type="file" id="impFile" accept=".xlsx,.xls,.csv" onchange="processImpFile(this.files[0])">
      ${ic('ul',28)}<p>Click or drag & drop Excel / CSV file</p><span>Supports .xlsx .xls .csv</span>
    </div>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="dlTemplate()">${ic('dl')} Download Template</button>
    </div>
    <div id="imp-preview" style="margin-top:12px"></div>`,
    `<button class="btn btn-secondary" onclick="cModal()">Close</button><button class="btn btn-primary" id="imp-confirm-btn" style="display:none" onclick="confirmImport()">Confirm Import</button>`);
  setupDrop('imp-dz',f=>processImpFile(f));
  window._importData=null;
}
function processImpFile(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!data.length){toast('No data found','error');return;}
      const inv=getInv();let added=0,updated=0,skipped=0;
      const preview=[];
      data.forEach(row=>{
        const id=String(row.id||row.ID||row['Galaxi PN']||'').trim();
        if(!id){skipped++;return;}
        const item={
          id,
          desc:String(row.desc||row.Description||'').trim(),
          mfr:String(row.mfr||row.Manufacturer||'').trim(),
          mpn:String(row.mpn||row.MPN||'').trim(),
          qty:parseInt(row.qty||row.Qty||0)||0,
          reserved:parseInt(row.reserved||0)||0,
          alert:parseInt(row.alert||row.Alert||10)||10,
          location:String(row.location||row.Location||'').trim(),
          cat:String(row.cat||row.Category||'').trim(),
          type:String(row.type||row.Type||'general').trim().toLowerCase(),
        };
        if(!item.desc||!item.mfr||!item.mpn||!item.cat){skipped++;preview.push({...item,action:'SKIP',reason:'Missing required fields'});return;}
        const exists=inv.findIndex(i=>i.id===id)>=0;
        preview.push({...item,action:exists?'UPDATE':'ADD',reason:''});
        if(exists)updated++;else added++;
      });
      window._importData=preview.filter(r=>r.action!=='SKIP');
      const skipRows=preview.filter(r=>r.action==='SKIP');
      document.getElementById('imp-preview').innerHTML=`
        <div class="alert ag">${ic('chk')} Ready to import: <strong>${added}</strong> new · <strong>${updated}</strong> update · <strong>${skipped}</strong> skipped</div>
        <div style="max-height:180px;overflow-y:auto;background:var(--bg3);border-radius:var(--r);padding:8px">
          ${preview.slice(0,20).map(r=>`<div style="display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px">
            <span class="tag ${r.action==='ADD'?'tg':r.action==='UPDATE'?'tb':'tr'}" style="min-width:56px;justify-content:center">${r.action}</span>
            <span class="td-m" style="min-width:100px">${r.id}</span>
            <span style="flex:1;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.desc||r.reason}</span>
          </div>`).join('')}
          ${preview.length>20?`<div style="color:var(--text3);font-size:11px;padding:6px 0">... and ${preview.length-20} more rows</div>`:''}
        </div>`;
      const btn=document.getElementById('imp-confirm-btn');
      if(btn&&(added+updated)>0)btn.style.display='flex';
    }catch(err){toast('Error: '+err.message,'error');}
  };
  reader.readAsArrayBuffer(file);
}
function confirmImport(){
  if(!window._importData?.length)return;
  const inv=getInv();
  window._importData.forEach(item=>{
    const idx=inv.findIndex(i=>i.id===item.id);
    if(idx>=0)inv[idx]={...inv[idx],...item};
    else inv.push(item);
  });
  save(KEYS.inv,inv);
  addLog('Bulk Import',`${window._importData.length} components`);
  toast(`Import complete: ${window._importData.filter(r=>r.action==='ADD').length} added, ${window._importData.filter(r=>r.action==='UPDATE').length} updated`);
  cModal();window._importData=null;
  rInv(document.getElementById('pg-inventory'));
}

    <div class="card-b" id="bom-res-body"></div>
  </div>`;
  window._bomItems=[];

}
function addBOMItem(){
  const v=document.getElementById('bom-gpn').value.trim();if(!v)return;
  const inv=getInv();
  const found=inv.find(i=>i.id===v)||inv.find(i=>i.desc?.toLowerCase()===v.toLowerCase())||inv.find(i=>i.desc?.toLowerCase().includes(v.toLowerCase()));
  const qty=parseInt(document.getElementById('bom-need').value)||1;
  if(!window._bomItems)window._bomItems=[];
  const key=found?.id||v;
  if(window._bomItems.find(x=>x.id===key)){toast('Already added','warn');return;}
  window._bomItems.push({id:key,need:qty,desc:found?.desc||v,inSystem:!!found});
  document.getElementById('bom-gpn').value='';
  document.getElementById('bom-need').value='1';
  renderBOMList();
}
function renderBOMList(){
  const el=document.getElementById('bom-list');if(!el)return;
  el.innerHTML=(window._bomItems||[]).map((b,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">
      <span class="td-m" style="color:${b.inSystem?'var(--info)':'var(--purple)'};min-width:100px">${b.id}</span>
      <span style="flex:1;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.desc}</span>
      <span>×<strong style="margin-left:2px">${b.need}</strong></span>
      <button class="btn btn-ghost btn-sm" onclick="window._bomItems.splice(${i},1);renderBOMList()">${ic('x',10)}</button>
    </div>`).join('');
}
function handleBOMUpload(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{defval:''});
      window._bomItems=[];
      const inv=getInv();
      data.forEach(row=>{
        const gpn=String(row.gpn||row.GPN||row['Galaxi PN']||row.id||'').trim();
        const mpn=String(row.mpn||row.MPN||'').trim();
        const qty=parseInt(row.qty||row.Qty||row.QTY||1)||1;
        const desc=String(row.desc||row.Description||'').trim();
        const found=inv.find(i=>i.id===gpn)||inv.find(i=>i.mpn===mpn&&mpn);
        const key=found?.id||gpn||mpn;
        if(key)window._bomItems.push({id:key,need:qty,desc:found?.desc||desc||key,inSystem:!!found});
      });
      renderBOMList();
      toast(`${window._bomItems.length} items loaded`,'info');
    }catch(err){toast('Error: '+err.message,'error');}
  };
  reader.readAsArrayBuffer(file);
}
function dlBOMTemplate(){
  const ws=XLSX.utils.aoa_to_sheet([['gpn','mpn','qty','desc'],['GX-MCU-001','STM32F407VGT6',10,'STM32F407VG MCU'],['GX-CAP-001','',200,'100nF MLCC'],['','ABC-123-X',5,'Unknown part — needs item code']]);
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'BOM');
  XLSX.writeFile(wb,'bom_template.xlsx');toast('Template downloaded');
}
function runBOM(){
  const woId=document.getElementById('bom-wo')?.value;
  if(!woId){toast('Please select a Work Order first','error');return;}
  if(!window._bomItems?.length){toast('Add components to BOM first','warn');return;}
  const inv=getInv();
  let ok=0,wn=0,bd=0,unk=0;
  const results=window._bomItems.map(b=>{
    const item=inv.find(i=>i.id===b.id);
    if(!item){unk++;return{...b,status:'unknown',avail:0,total:0};}
    const avail=item.qty-item.reserved;
    if(avail>=b.need){ok++;return{...b,status:'ok',avail,total:item.qty};}
    if(item.qty>=b.need){wn++;return{...b,status:'warn',avail,total:item.qty};}
    bd++;return{...b,status:'bad',avail,total:item.qty||0};
  });
  document.getElementById('bom-ok').textContent=ok;
  document.getElementById('bom-wn').textContent=wn;
  document.getElementById('bom-bd').textContent=bd;
  document.getElementById('bom-unk').textContent=unk;
  const btns=document.getElementById('bom-btns');
  const wo=getWO().find(w=>w.id===woId);
  btns.innerHTML=`
    ${bd>0||unk>0?`<button class="btn btn-warn" style="justify-content:center" onclick="raisePRFromBOM()">${ic('cart')} Raise PR for ${bd+unk} items (WO: ${woId})</button>`:''}
    ${unk>0?`<button class="btn btn-ghost" style="justify-content:center" onclick="requestICFromBOM()">${ic('tag')} Request item codes for ${unk} unknowns</button>`:''}
    ${ok+wn>0?`<button class="btn btn-ghost" style="justify-content:center" onclick="reserveBOMStock('${woId}')">${ic('chk')} Reserve ${ok+wn} available items</button>`:''}`;
  window._lastBOMResults=results;window._lastBOMWO=woId;
  const card=document.getElementById('bom-res-card');const body=document.getElementById('bom-res-body');
  if(card&&body){
    card.style.display='block';
    document.getElementById('bom-res-title').textContent='Match Results — '+woId+(wo?' ('+wo.title+')':'');
    body.innerHTML=results.map(r=>{
      const cls=r.status==='ok'?'bsi-ok':r.status==='warn'?'bsi-w':r.status==='unknown'?'bsi-unk':'bsi-bad';
      const ic2=r.status==='ok'?'✓':r.status==='warn'?'⚠':r.status==='unknown'?'?':'✕';
      const tc=r.status==='ok'?'tg':r.status==='warn'?'ty':r.status==='unknown'?'tp':'tr';
      const tl=r.status==='ok'?'In Stock':r.status==='warn'?'Partial':r.status==='unknown'?'Not in System':'Not Available';
      return`<div class="bom-item">
        <div class="bsi ${cls}">${ic2}</div>
        <div style="flex:1"><div style="font-size:12px;font-weight:500">${r.desc||r.id}</div><div style="font-size:10px;color:var(--text3);font-family:var(--mono)">${r.id}</div></div>
        <div style="font-size:11px;color:var(--text3);min-width:120px;text-align:right">Need ${r.need} · Have ${r.avail} free</div>
        <span class="tag ${tc}" style="min-width:90px;justify-content:center">${tl}</span>
      </div>`;
    }).join('');
  }
  toast(`BOM: ${ok} OK, ${wn} partial, ${bd} missing, ${unk} unknown`,'info');
}
function reserveBOMStock(woId){
  const inv=getInv();let cnt=0;
  (window._bomItems||[]).forEach(b=>{
    const item=inv.find(i=>i.id===b.id);
    if(item&&(item.qty-item.reserved)>=b.need){item.reserved+=b.need;cnt++;}
  });
  save(KEYS.inv,inv);addMov({gpn:'BULK',desc:'BOM Reservation for '+woId,type:'reserved',qty:cnt,ref:woId,project:woId,user:S.currentUser.displayName||S.currentUser.label});
  toast(`${cnt} items reserved for ${woId}`);
}
function raisePRFromBOM(){
  if(!window._lastBOMResults||!window._lastBOMWO){toast('Run BOM match first','warn');return;}
  const woId=window._lastBOMWO;
  const wo=getWO().find(w=>w.id===woId);
  const needPR=window._lastBOMResults.filter(r=>r.status==='bad'||r.status==='unknown');
  if(!needPR.length){toast('No items need PR','info');return;}
  const all=getPR();
  // ONE PR for all BOM missing items
  const id='PR-'+new Date().getFullYear()+'-'+String(all.length+1).padStart(3,'0');
  all.unshift({
    id,
    project:wo?.title||woId,woRef:woId,
    by:S.currentUser.displayName||S.currentUser.label,
    byUsername:S.currentUser.username,byRole:S.currentUser.label,
    urgency:'Normal',supplier:'',quotation:'',status:'open',
    createdAt:ts(),
    notes:'Auto-raised from BOM match',
    items:needPR.map(item=>({desc:item.desc||item.id,gpn:item.status==='unknown'?'TBD':item.id,qty:item.need,inSystem:item.status!=='unknown'})),
    component:`${needPR.length} components from BOM`,
    gpn:'(multiple)',
    qty:needPR.reduce((s,r)=>s+r.need,0),
  });
  save(KEYS.pr,all);addLog('BOM PR Raise',`${id}: ${needPR.length} items for ${woId}`);buildNav();
  toast(`PR ${id} raised for WO ${woId} — ${needPR.length} items`,'success');
  showPage('pr');
}
function requestICFromBOM(){
  if(!window._lastBOMResults)return;
  const unknowns=window._lastBOMResults.filter(r=>r.status==='unknown');
  if(!unknowns.length){toast('No unknowns found','info');return;}
  const all=getIC();
  unknowns.forEach(item=>{
    const id=genId('IC-',all);
    all.unshift({id,mfr:'Unknown',mpn:item.id,desc:item.desc||item.id,by:S.currentUser.displayName||S.currentUser.label,ctoNote:'',status:'pending',createdAt:ts(),assignedGPN:null,woRef:window._lastBOMWO});
  });
  save(KEYS.ic,all);addLog('BOM IC Request',`${unknowns.length} items`);buildNav();
  toast(`${unknowns.length} item code requests submitted to CTO`,'info');
  showPage('itemcodes');
}
function dlBOMResults(){
  if(!window._lastBOMResults?.length){toast('Run BOM match first','warn');return;}
  const inv=getInv();
  const ws=XLSX.utils.json_to_sheet(window._lastBOMResults.map(r=>{
    const item=inv.find(i=>i.id===r.id);
    return{'WO':window._lastBOMWO||'—','Galaxi PN':r.id,'Description':r.desc,'Qty Needed':r.need,'Available':r.avail,'Total Stock':item?.qty||0,'Status':r.status,'Action Required':r.status==='unknown'?'Request Item Code':r.status==='bad'||r.status==='warn'?'Raise PR':'—'};
  }));
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'BOM Results');
  XLSX.writeFile(wb,'bom_results_'+(window._lastBOMWO||'manual')+'.xlsx');toast('Exported');
}

function submitIC(){
  const icRName=document.getElementById('nic-rname')?.value.trim();
  if(!icRName){toast('Please enter your full name','error');return;}
  const m=document.getElementById('nic-m').value.trim();
  const p=document.getElementById('nic-p').value.trim();
  const d=document.getElementById('nic-d').value.trim();
  const cat=document.getElementById('nic-cat')?.value.trim();
  if(!m||!p||!d){toast('Manufacturer, MPN and description are required','error');return;}
  if(!cat){toast('Category is required','error');return;}
  const all=getIC();const id=genId('IC-',all);
  all.unshift({id,mfr:m,mpn:p,desc:d,
    cat,compType:document.getElementById('nic-type')?.value||'project',
    pkg:document.getElementById('nic-pkg')?.value.trim()||'',
    unitCost:parseFloat(document.getElementById('nic-cost')?.value)||0,
    by:icRName,
    byDesig:document.getElementById('nic-rdesig')?.value.trim()||'',
    byUsername:S.currentUser.username,byRole:S.currentUser.label,
    ctoNote:'',status:'pending',createdAt:ts(),assignedGPN:null,

}

function issueIndent(id){
  const all=getInd();const ind=all.find(x=>x.id===id);if(!ind)return;
  const inv=getInv();const item=inv.find(i=>i.id===ind.gpn);
  if(item){
    if(item.qty-item.reserved<ind.qty){toast('Insufficient available stock','error');return;}
    item.qty-=ind.qty;save(KEYS.inv,inv);
  }
  ind.status='issued';save(KEYS.ind,all);
  addMov({gpn:ind.gpn,desc:ind.desc,type:'issued',qty:-ind.qty,ref:ind.id,project:ind.project,user:S.currentUser.displayName||S.currentUser.label});
  addLog('Issue Indent',id);toast(id+' issued — stock deducted');rInd(document.getElementById('pg-indents'));
}

function submitIndent(){
  const niName=document.getElementById('ni-name')?.value.trim();
  if(!niName){toast('Please enter your full name','error');return;}
  const gpn=document.getElementById('ni-gpn').value.trim();
  const qty=parseInt(document.getElementById('ni-qty').value)||0;
  if(!gpn||qty<1){toast('GPN and quantity required','error');return;}
  const inv=getInv();const item=inv.find(i=>i.id===gpn);

  const wo=document.getElementById('ni-wo').value;

  const all=getInd();const id=genId('ISS-',all);
  all.unshift({id,type:document.getElementById('ni-t').value,gpn,desc:item.desc,qty,

    status:'pending',createdAt:ts()});

  toast(id+' submitted to store');rInd(document.getElementById('pg-indents'));
}

    });

  if(isSM()&&smPending.length>0){

function rPRTbl(){
  const q=(document.getElementById('prQ')?.value||'').toLowerCase();
  const sf=document.getElementById('prSt')?.value||'';
  const wf=document.getElementById('prWO')?.value||'';
  const items=getPR().filter(p=>{
    if(q&&!p.id?.toLowerCase().includes(q)&&!p.component?.toLowerCase().includes(q)&&!p.gpn?.toLowerCase().includes(q))return false;
    if(sf&&p.status!==sf)return false;
    if(wf&&p.woRef!==wf)return false;
    return true;
  });
  const w=document.getElementById('prTbl');if(!w)return;
  w.innerHTML=`<table><thead><tr><th>PR No.</th><th>Component</th><th>Galaxi PN</th><th>Qty</th><th>Work Order</th><th>Project</th><th>Raised by</th><th>Supplier</th><th>Quotation</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${items.length?items.map(p=>`<tr>

function updatePRProject(){
  const sel=document.getElementById('np-wo');
  const opt=sel.options[sel.selectedIndex];
  const title=opt?.dataset?.title||'';
  const proj=document.getElementById('np-proj');
  if(proj)proj.value=title;
}
function loadPRBOM(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{defval:''});
      const inv=getInv();
      window._prItems=window._prItems||[];
      data.forEach(row=>{
        const desc=String(row.desc||row.Description||row.component||row.Component||'').trim();
        const gpn=String(row.gpn||row.GPN||row['Galaxi PN']||row.id||'').trim();
        const mpn=String(row.mpn||row.MPN||'').trim();
        const qty=parseInt(row.qty||row.Qty||1)||1;
        const found=inv.find(i=>i.id===gpn)||inv.find(i=>i.mpn===mpn&&mpn);
        if(desc||gpn)window._prItems.push({desc:desc||found?.desc||gpn,gpn:found?.id||gpn||'TBD',qty,inSystem:!!found});
      });
      renderPRItems();toast(`${window._prItems.length} items loaded`,'info');
    }catch(err){toast('Error: '+err.message,'error');}
  };
  reader.readAsArrayBuffer(file);
}
function addPRItem(){
  const desc=document.getElementById('np-c').value.trim();
  const gpn=document.getElementById('np-g').value.trim();
  const qty=parseInt(document.getElementById('np-q').value)||1;
  if(!desc){toast('Enter component description','warn');return;}
  window._prItems=window._prItems||[];
  const inv=getInv();
  const found=inv.find(i=>i.id===gpn)||inv.find(i=>i.desc?.toLowerCase()===desc.toLowerCase());
  window._prItems.push({desc,gpn:found?.id||gpn||'TBD',qty,inSystem:!!found});
  document.getElementById('np-c').value='';
  document.getElementById('np-g').value='';
  document.getElementById('np-q').value='1';
  renderPRItems();
}

function submitPR(){
  const woId=document.getElementById('np-wo')?.value;
  if(!woId){toast('Work Order is required for all PRs','error');return;}
  const prName=document.getElementById('np-rname')?.value.trim();
  if(!prName){toast('Please enter your full name','error');return;}
  // collect items
  const manualDesc=document.getElementById('np-c')?.value.trim();
  const manualQty=parseInt(document.getElementById('np-q')?.value)||0;
  if(!window._prItems?.length&&manualDesc&&manualQty>0){
    const gpn=document.getElementById('np-g')?.value.trim();
    const found=getInv().find(i=>i.id===gpn);
    window._prItems=[{desc:manualDesc,gpn:found?.id||gpn||'TBD',qty:manualQty,inSystem:!!found}];
  }
  if(!window._prItems?.length){toast('Add at least one component','error');return;}
  const wo=getWO().find(w=>w.id===woId);
  const all=getPR();
  const urgency=document.getElementById('np-u')?.value||'Normal';
  const notes=document.getElementById('np-notes')?.value||'';
  // ONE PR number for the entire batch
  const id='PR-'+new Date().getFullYear()+'-'+String(all.length+1).padStart(3,'0');
  all.unshift({
    id,
    project:wo?.title||woId,
    woRef:woId,
    by:prName||S.currentUser.displayName||S.currentUser.label,
    byDesig:document.getElementById('np-rdesig')?.value.trim()||'',
    byUsername:S.currentUser.username,
    byRole:S.currentUser.label,
    urgency,
    supplier:'',quotation:'',
    status:'open',
    createdAt:ts(),
    notes,
    items:window._prItems.map(it=>({desc:it.desc,gpn:it.gpn,qty:it.qty,inSystem:it.inSystem})),
    // keep flat fields for backward compat display
    component:window._prItems.length===1?window._prItems[0].desc:`${window._prItems.length} components`,
    gpn:window._prItems.length===1?window._prItems[0].gpn:'(multiple)',
    qty:window._prItems.reduce((s,it)=>s+it.qty,0),
  });
  save(KEYS.pr,all);addLog('Submit PR',`${id}: ${window._prItems.length} items for WO ${woId}`);buildNav();cModal();
  toast(`PR ${id} raised — ${window._prItems.length} item${window._prItems.length>1?'s':''} for WO ${woId}`,'success');
  window._prItems=[];rPR(document.getElementById('pg-pr'));
}

function confirmReleasePO(id){
  const all=getPR();const p=all.find(x=>x.id===id);if(!p)return;
  const sup=document.getElementById('por-sup').value.trim();
  const amt=document.getElementById('por-amt').value.trim();
  const lead=document.getElementById('por-lead').value.trim();
  const eta=document.getElementById('por-eta').value.trim();
  const ref=document.getElementById('por-ref').value.trim();
  const terms=document.getElementById('por-terms').value.trim();
  const rem=document.getElementById('por-rem').value.trim();
  if(!sup){toast('Supplier name is required','error');document.getElementById('por-sup').focus();return;}
  if(!amt){toast('PO amount is required','error');document.getElementById('por-amt').focus();return;}
  if(!lead||parseInt(lead)<1){toast('Lead time (days) is required','error');document.getElementById('por-lead').focus();return;}
  if(!eta){toast('Expected delivery date is required','error');document.getElementById('por-eta').focus();return;}
  if(!ref){toast('PO reference number is required','error');document.getElementById('por-ref').focus();return;}
  if(!terms){toast('Payment terms are required','error');document.getElementById('por-terms').focus();return;}
  if(!rem){toast('Delivery remarks are required','error');document.getElementById('por-rem').focus();return;}
  p.status='po_released';
  p.supplier=sup;p.quotation=amt;p.leadTime=lead+' days';
  p.expectedDelivery=eta;p.poRef=ref;p.paymentTerms=terms;p.poRemarks=rem;
  p.poReleasedAt=ts();p.poReleasedBy=S.currentUser.displayName||S.currentUser.label;
  save(KEYS.pr,all);addLog('PO Released',id+' '+sup);buildNav();cModal();
  toast('PO released to '+sup+' — lead time '+lead+' days','success');
  rPR(document.getElementById('pg-pr'));
}

function submitGRN(){
  const gpn=document.getElementById('grn-gpn').value.trim();
  const qty=parseInt(document.getElementById('grn-qty').value)||0;
  const qc=document.getElementById('grn-qc').value;
  const loc=document.getElementById('grn-loc').value.trim();
  const prRefVal=document.getElementById('grn-pr').value.trim()||'DIRECT';
  const rem=document.getElementById('grn-rem').value.trim();
  if(!gpn){toast('Galaxi PN is required','error');document.getElementById('grn-gpn').focus();return;}
  if(qty<1){toast('Quantity received must be at least 1','error');document.getElementById('grn-qty').focus();return;}
  if(!loc){toast('Storage location is required','error');document.getElementById('grn-loc').focus();return;}
  if(!rem){toast('QC remarks are required','error');document.getElementById('grn-rem').focus();return;}
  const inv=getInv();const item=inv.find(i=>i.id===gpn);
  const all=getGRN();const id=genId('GRN-',all);
  const entry={id,prRef:prRefVal,component:item?.desc||gpn,gpn,
    supplier:document.getElementById('grn-s').value.trim(),
    qtyReceived:qty,qcStatus:qc,
    location:loc,
    remarks:rem,
    status:qc==='pass'?'stocked':qc==='fail'?'rejected':'qc_hold',
    createdAt:ts(),by:S.currentUser.displayName||S.currentUser.label};
  all.unshift(entry);save(KEYS.grn,all);
  if(qc==='pass'&&item){
    item.qty+=qty;
    item.location=loc;
    save(KEYS.inv,inv);
    addMov({gpn,desc:item.desc,type:'received',qty,ref:id,project:'—',user:S.currentUser.displayName||S.currentUser.label});
  } else if(qc==='fail'){
    addMov({gpn,desc:item?.desc||gpn,type:'rejected',qty,ref:id,project:'—',user:S.currentUser.displayName||S.currentUser.label});
  }
  if(prRefVal&&prRefVal!=='DIRECT'){
    const allPRs=getPR();const lPR=allPRs.find(p=>p.id===prRefVal);
    if(lPR&&lPR.status==='grn_pending'){
      lPR.status=qc==='pass'?'qc_pass':qc==='fail'?'qc_fail':'grn_pending';
      lPR.grnRef=id;lPR.qcAt=ts();lPR.qcBy=S.currentUser.displayName||S.currentUser.label;
      if(loc)lPR.stockLocation=loc;
      save(KEYS.pr,allPRs);buildNav();
    }
  }
  addLog('GRN Entry',id+(qc==='pass'?' QC PASS — stocked at '+loc:qc==='fail'?' QC FAIL':''));
  toast(id+(qc==='pass'?' — QC passed, stocked at '+loc:qc==='fail'?' — QC failed, Purchase Team notified':' — saved'),'');
  rGRN(document.getElementById('pg-grn'));
}

function passQC(id){
  const all=getGRN();const g=all.find(x=>x.id===id);if(!g)return;
  g.qcStatus='pass';g.status='stocked';save(KEYS.grn,all);
  const inv=getInv();const item=inv.find(i=>i.id===g.gpn);
  if(item){item.qty+=g.qtyReceived;save(KEYS.inv,inv);}
  addMov({gpn:g.gpn,desc:g.component,type:'received',qty:g.qtyReceived,ref:id,project:'—',user:S.currentUser.displayName||S.currentUser.label});
  const grnAll_p=getGRN();const grnItem_p=grnAll_p.find(x=>x.id===id);
  if(grnItem_p?.prRef&&grnItem_p.prRef!=='DIRECT'){
    const prAll_p=getPR();const pr_p=prAll_p.find(p=>p.id===grnItem_p.prRef);
    if(pr_p){pr_p.status='qc_pass';pr_p.qcAt=ts();pr_p.qcBy=S.currentUser.displayName||S.currentUser.label;save(KEYS.pr,prAll_p);buildNav();}
  }
  addLog('QC Pass',id);toast(id+' QC passed — stock updated');rGRN(document.getElementById('pg-grn'));
}
function failQC(id){
  const all=getGRN();const g=all.find(x=>x.id===id);if(!g)return;
  g.qcStatus='fail';g.status='rejected';save(KEYS.grn,all);
  addMov({gpn:g.gpn,desc:g.component,type:'rejected',qty:g.qtyReceived,ref:id,project:'—',user:S.currentUser.displayName||S.currentUser.label});
  const grnAll_f=getGRN();const grnItem_f=grnAll_f.find(x=>x.id===id);
  if(grnItem_f?.prRef&&grnItem_f.prRef!=='DIRECT'){
    const prAll_f=getPR();const pr_f=prAll_f.find(p=>p.id===grnItem_f.prRef);
    if(pr_f){pr_f.status='qc_fail';pr_f.qcAt=ts();pr_f.qcBy=S.currentUser.displayName||S.currentUser.label;save(KEYS.pr,prAll_f);buildNav();}
  }
  addLog('QC Fail',id);toast(id+' QC failed — Purchase Team to send to vendor','error');rGRN(document.getElementById('pg-grn'));
}
function dlGRN(){
  const d=getGRN();if(!d.length){toast('No data','warn');return;}

              <td><span class="tag tgr">${usr.label}</span></td>
              <td><button class="btn btn-ghost btn-sm" onclick="resetUserPW('${usr.username}')">${ic('key',10)} Reset PW</button></td>
            </tr>`).join('')}</tbody>
          </table></div>
        </div>
      </div>`:''}
    </div>
    <div>
      <div class="card">
        <div class="card-h"><div class="card-title">System Status</div></div>
        <div class="card-b">
          ${[['Components',getInv().length],['Total units',getInv().reduce((s,i)=>s+i.qty,0).toLocaleString()],['Low stock',getInv().filter(i=>i.qty<=(i.alert||0)).length],['Active WOs',getWO().filter(w=>w.status==='active').length],['Pending approvals',getWO().filter(w=>w.status==='erp_review'||w.status==='cto_approval').length],['Open PRs',getPR().filter(p=>p.status==='open').length],['Movements logged',getMov().length]].map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="color:var(--text3)">${k}</span><span class="td-m">${v}</span></div>`).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-h"><div class="card-title">Data Management</div></div>
        <div class="card-b" style="display:flex;flex-direction:column;gap:7px">
          <div style="display:flex;align-items:center;gap:8px;background:var(--bg3);border-radius:var(--r);padding:10px 12px;margin-bottom:4px">
            <div style="flex:1">
              <div style="font-size:12px;font-weight:500">Cloud Sync</div>
              <div style="font-size:11px;color:var(--text3)">Force reload all data from Google Sheets</div>
            </div>
            <button class="btn btn-secondary btn-sm" onclick="manualSync()">${ic('ref',11)} Sync Now</button>
          </div>
          <button class="btn btn-secondary" style="justify-content:center" onclick="exportAll()">${ic('dl')} Export All Data (Excel)</button>
          ${isERP()?`<button class="btn btn-secondary" style="justify-content:center" onclick="showImportModal()">${ic('ul')} Import Components</button>`:''}
          ${isERP()?`<div style="height:1px;background:var(--border);margin:2px 0"></div>
          <button class="btn btn-danger" style="justify-content:center" onclick="clearAll()">${ic('trash')} Clear All Data (Reset)</button>
          <div style="font-size:10px;color:var(--text3)">ERP Team only — clears all data for everyone. Export first.</div>`:''}
        </div>
      </div>
      <div class="card">
        <div class="card-h"><div class="card-title">Audit Log</div><button class="btn btn-ghost btn-sm" onclick="dlLog()">${ic('dl',11)}</button></div>
        <div style="max-height:240px;overflow-y:auto"><table>
          <thead><tr><th>Time</th><th>User</th><th>Role</th><th>Action</th><th>Detail</th></tr></thead>
          <tbody>${logs.slice(0,40).map(l=>`<tr><td class="td-m" style="font-size:10px;white-space:nowrap">${l.time}</td><td style="font-size:11px">${l.user}</td><td style="font-size:10px;color:var(--text3)">${l.role}</td><td style="font-size:12px;font-weight:500">${l.action}</td><td style="font-size:11px;color:var(--text3)">${l.detail}</td></tr>`).join('')||`<tr class="empty-row"><td colspan="5">No log</td></tr>`}
          </tbody>
        </table></div>
      </div>
    </div>
  </div>`;
}
function showChangePW(){
  openModal('Change Password',`
    <div class="fgrid">
      <div class="fg s2"><label class="flabel">Current Password</label><input class="fctl" type="password" id="cpw-old" placeholder="Current password"></div>
      <div class="fg s2"><label class="flabel">New Password</label><input class="fctl" type="password" id="cpw-new" placeholder="New password (min 8 chars)"></div>
      <div class="fg s2"><label class="flabel">Confirm New Password</label><input class="fctl" type="password" id="cpw-conf" placeholder="Repeat new password"></div>
    </div>`,
    `<button class="btn btn-secondary" onclick="cModal()">Cancel</button><button class="btn btn-primary" onclick="changePW()">Change Password</button>`);
}
function changePW(){
  const old=document.getElementById('cpw-old').value;
  const nw=document.getElementById('cpw-new').value;
  const conf=document.getElementById('cpw-conf').value;
  if(old!==S.currentUser.password){toast('Current password incorrect','error');return;}
  if(nw.length<8){toast('New password must be at least 8 characters','error');return;}
  if(nw!==conf){toast('Passwords do not match','error');return;}
  const users=getUsers();
  const u=users.find(x=>x.username===S.currentUser.username);
  if(u){u.password=nw;S.currentUser.password=nw;}
  saveUsers(users);addLog('Change Password','Password updated');cModal();
  toast('Password changed successfully');
}
function resetUserPW(username){
  const newPW=prompt(`Reset password for ${username}.\nEnter new password (min 8 chars):`,'');
  if(!newPW||newPW.length<8){toast('Password must be at least 8 characters','error');return;}
  const users=getUsers();const u=users.find(x=>x.username===username);
  if(u)u.password=newPW;
  saveUsers(users);addLog('Reset Password','Reset for '+username);
  toast('Password reset for '+username);
}
function signOut(){
  S.currentUser=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
  document.getElementById('l-user').value='';
  document.getElementById('l-pass').value='';
  addLog&&addLog('Logout','');
  toast('Signed out','info');
}
function exportAll(){
  const wb=XLSX.utils.book_new();
  [['Inventory',getInv()],['Work Orders',getWO()],['Item Codes',getIC()],['Purchase Requests',getPR()],['GRN',getGRN()],['Indents',getInd()],['Movements',getMov()]].forEach(([n,d])=>{if(d.length){const ws=XLSX.utils.json_to_sheet(d);XLSX.utils.book_append_sheet(wb,ws,n);}});
  XLSX.writeFile(wb,'galaxi_backup_'+new Date().toISOString().slice(0,10)+'.xlsx');toast('All data exported');
}
function clearAll(){
  if(!isERP()){toast('Only ERP Team can clear all data','error');return;}
  if(!confirm('CLEAR ALL DATA? This will delete everything for ALL users. Cannot be undone.'))return;
  if(!confirm('Final confirmation — delete everything?'))return;
  Object.values(KEYS).forEach(k=>localStorage.removeItem(k));
  initDB();toast('All data cleared','warn');showPage('dashboard');
}
function dlLog(){
  const d=load(KEYS.log)||[];if(!d.length){toast('No log','warn');return;}
  const ws=XLSX.utils.json_to_sheet(d);const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Audit Log');XLSX.writeFile(wb,'audit_log.xlsx');toast('Exported');
}

// ═══════════════════════════════════════════════════
// GLOBAL SEARCH & NOTIFICATIONS
// ═══════════════════════════════════════════════════
function gSearch(q){
  if(!q.trim()||!S.currentUser)return;
  const v=q.toLowerCase();
  if(v.startsWith('gx-')){showPage('inventory');setTimeout(()=>{invF.q=q;rInvTable();},80);}
  else if(v.startsWith('wo-'))showPage('workorders');
  else if(v.startsWith('pr-'))showPage('pr');
  else if(v.startsWith('ic-'))showPage('itemcodes');
}
function showNotifs(){
  const inv=getInv();const ls=inv.filter(i=>i.qty<=(i.alert||0));
  const pw=getWO().filter(w=>w.status==='erp_review'||w.status==='cto_approval');
  const pic=getIC().filter(i=>i.status==='pending');
  const ppr=getPR().filter(p=>p.status==='open');
  const msgs=[...ls.slice(0,3).map(i=>`Low stock: ${i.id} (${i.qty} / limit ${i.alert||0})`),
              ...pw.slice(0,2).map(w=>`WO pending: ${w.id} — ${w.title}`),
              ...pic.slice(0,2).map(i=>`IC pending CTO: ${i.id} — ${i.desc}`),
              ...ppr.slice(0,2).map(p=>`Open PR: ${p.id} — ${p.component}`)];
  if(!msgs.length){toast('No alerts','info');return;}
  openModal('Notifications',msgs.map(m=>`<div class="alert aw" style="margin-bottom:7px">${ic('warn')} ${m}</div>`).join(''));
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',async function(){
  initDB();
  await loadAllFromCloud();
  // Focus username on login
  const lu=document.getElementById('l-user');
  if(lu)lu.focus();
});
</script>
